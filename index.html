<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🛒 Grocery Calculator</h2>

  <!-- Header -->
  <div class="item header">
    <strong>Item</strong>
    <strong>Price</strong>
    <strong>Qty</strong>
    <strong>Total</strong>
    <strong>Action</strong>
  </div>

  <div id="items"></div>

  <button class="add-btn" onclick="addItem()">+ Add Item</button>

  <div class="total">
    Grand Total: ₱<span id="grandTotal">0.00</span>
  </div>

  <!-- Payment Section inside container -->
  <div class="payment">
    <label for="amountGiven">Amount Given to Cashier:</label>
    <input type="number" id="amountGiven" placeholder="Enter amount" oninput="calculateChange()">

    <label for="change">Change You Will Receive:</label>
    <input type="text" id="change" placeholder="0.00" readonly>

    <p id="paymentMessage"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
