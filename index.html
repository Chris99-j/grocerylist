<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🛒 Grocery Calculator</h2>

  <!-- Add Item Section -->
  <div class="add-item-section">
    <input type="text" id="newItemName" placeholder="Item Name">
    <input type="number" id="newItemPrice" placeholder="Price">
    <input type="number" id="newItemQty" placeholder="Qty">
    <input type="text" id="totalInput" placeholder="Total" disabled>
    <button class="add-btn" onclick="addItemFromFields()">Add Item</button>
  </div>

  <!-- Items Listing Header -->
  <div class="item header">
    <strong>Item</strong>
    <strong>Price</strong>
    <strong>Qty</strong>
    <strong>Total</strong>
    <strong>Action</strong>
  </div>

  <!-- Items Listing -->
  <div id="items"></div>

  <!-- Grand Total -->
  <div class="total">
    Grand Total: ₱<span id="grandTotal">0.00</span>
  </div>

  <!-- Payment Section -->
  <div class="payment">
    <label for="amountGiven">Amount Given:</label>
    <input type="number" id="amountGiven" placeholder="Enter amount" oninput="calculateChange()">

    <label for="change">Change:</label>
    <input type="text" id="change" placeholder="0.00" readonly>

    <!-- Status message -->
    <p id="paymentMessage" style="grid-column: 1 / -1; font-weight:bold; margin-top:5px;"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
